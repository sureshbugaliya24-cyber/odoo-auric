<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop by Category</title>

<style>
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #f9fafb;
  }

  /* ================= TOP PICKS ================= */

  .top-picks {
    padding: 30px 0;
    position: relative;
  }

  /* ================= CATEGORY TABS ================= */

  .category-tabs {
    display: flex;
    gap: 12px;
    padding: 0 30px;
    font-size: 10px;
    overflow-x: auto;
    margin-bottom: 16px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }

  .category-tabs::-webkit-scrollbar {
    display: none;
  }

  @media (min-width: 768px) {
    .category-tabs {
      gap: 20px;
      /* more space between tabs */
      margin-bottom: 30px;
      /* more spacing below */
    }

    .category-tab {
      padding: 10px 16px;
      /* larger clickable area */
      font-size: 14px;
      /* bigger text for desktop */
      min-width: 120px;
      /* wider tabs */
    }

    .category-tab.active {
      box-shadow: 4px 8px 8px #0000002e;
      /* slightly bigger shadow for active tab */
    }
  }

  .category-tab {
    border-radius: 5px;
    background: #daa345;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    min-width: 100px;
    text-align: center;
    align-content: center;
  }

  .category-tab.active {
    background: #a86f24;
    box-shadow: 3px 6px 6px #0000002e;
  }

  /* ================= PRODUCT STRIP ================= */

  .product-strip {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    padding: 0 30px;
  }

  .product-strip::-webkit-scrollbar {
    display: none;
  }

  .product-card {
    flex: 0 0 70%;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    overflow: hidden;
    scroll-snap-align: start;
  }

  @media (min-width: 768px) {
    .product-card {
      flex: 0 0 280px;
    }
  }

  .product-card img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
  }

  .product-info {
    padding: 10px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    min-height: 35px;
  }

  .product-title {
    font-size: 14px;
    font-weight: 600;
    color: #a86f24;
    flex: 1;
    min-width: 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.3;
    text-align: left;
  }

  .product-title a {
    text-decoration: none;
    color: inherit;
  }

  .product-price {
    font-size: 14px;
    font-weight: 700;
    color: #a86f24;
    white-space: nowrap;
    width: 36%;
  }

  .product-desc {
    font-size: 12px;
    color: #5f6f5f;
    margin: 6px 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-align: left
  }

  .rating-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    margin-bottom: 35px;
  }

  .star {
    color: #ccc;
  }

  .star.filled {
    color: #f4b400;
  }

  /* ================= VARIANT DROPDOWN ================= */

  .variant-dropdown {
    position: relative;
    margin: 8px 0;
    font-size: 13px;
  }

  .variant-selected {
    padding: 8px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .variant-selected::after {
    content: "▾";
    font-size: 14px;
  }

  .variant-options {
    position: absolute;
    top: 0%;
    left: 0;
    right: 0;
    background: #fff;
    border-radius: 6px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
    z-index: 20;
    display: none;
  }

  .variant-option {
    padding: 8px 10px;
    cursor: pointer;
  }

  .variant-option:hover {
    background: #f3f4f6;
  }

/* Purani price ko cut karne ke liye ===============================*/
.base-price {
    text-decoration: line-through;
    color: #9ca3af;
    font-size: 12px;
    font-weight: 400;
    margin-left: 5px;
}

  /* ================= CART ================= */

  .cart-row {
    margin-top: 8px;
  }

  .add-btn {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: none;
    background: #d19a45;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
  }

  .qty-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .qty-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #d19a45;
    color: #fff;
    border: none;
    cursor: pointer;
  }

  .hidden {
    display: none;
  }

  /* ================= ARROWS ================= */

  .strip-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    width: 36px;
    height: 36px;
    background: #e6e6e6;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
  }

  .strip-nav.left {
    left: 6px;
  }

  .strip-nav.right {
    right: 6px;
  }

/* ========================================== popup =============================== */

/* ================= CATEGORY POPUP STYLING ================= */
#cat-cart-popup {
    position: fixed;
    top: 25px;
    right: 25px;
    width: 380px;
    background: #ffffff;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    border-radius: 12px;
    padding: 15px;
    display: flex;
    gap: 15px;
    z-index: 10001;
    transform: translateX(150%);
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border-left: 6px solid #a86f24;
    align-items: flex-start;
}

#cat-cart-popup.cat-show { transform: translateX(0); }

.cat-pop-img-wrapper { flex-shrink: 0; position: relative; }

#cat-pop-img {
    width: 75px;
    height: 75px;
    border-radius: 8px;
    object-fit: cover;
    border: 1px solid #eee;
}

.cat-popup-details { 
    flex: 1; 
    display: flex;
    flex-direction: column;
    align-items: flex-start; 
    text-align: left;
    min-width: 0;
}

.cat-pop-top-row {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
}

#cat-pop-title {
    margin: 0;
    font-size: 15px;
    color: #333;
    font-weight: 600;
    line-height: 1.2;
}

.cat-pop-price-display {
    font-weight: 600;
    color: #333;
    font-size: 16px;
    white-space: nowrap;
}

#cat-pop-variant {
    margin: 2px 0 0 0;
    font-size: 13px;
    color: #666;
}

.cat-view-cart-btn {
    display: block;
    width: 100%;
    text-align: center;
    background: #a86f24;
    color: #fff !important;
    text-decoration: none;
    font-size: 14px;
    padding: 10px 0;
    border-radius: 8px;
    margin-top: 15px;
    font-weight: 600;
}

/* Mobile Responsive */
@media (max-width: 767px) {
    #cat-cart-popup {
        width: auto;
        top: auto;
        bottom: 25px;
        left: 20px;
        right: 20px;
        transform: translateY(200%);
    }
    #cat-cart-popup.cat-show { transform: translateY(0); }
}

/* ========================================== popup End =============================== */




</style>

<img src="/custom_website/static/src/img/shop_by_category3.jpg" style="width: 100%; padding-top: 8px" loading="lazy">



<div id="cat-cart-popup">
    <div class="cat-pop-img-wrapper">
        <img id="cat-pop-img" src="" alt="product" loading="lazy">
    </div>
    <div class="cat-popup-details">
        <div class="cat-pop-top-row">
            <h4 id="cat-pop-title">Product Name</h4>
            <span class="cat-pop-price-display">₹<span id="cat-pop-price">0</span></span>
        </div>
        <p id="cat-pop-variant">1 Kg</p>
        <a href="/shop/cart" class="cat-view-cart-btn">View cart</a>
    </div>
</div>




<div class="top-picks">
  <div class="strip-nav left" id="prevBtn">‹</div>
  <div class="strip-nav right" id="nextBtn">›</div>

  <div class="category-tabs" id="categoryTabs"></div>
  <div class="product-strip" id="productStrip"></div>
</div>
<script>
  const API = {
    categories: "/api/categories",
    products: "/api/products-by-id?category_id=",
  };

  const tabsEl = document.getElementById("categoryTabs");
  const productEl = document.getElementById("productStrip");

  fetch(API.categories)
    .then((r) => r.json())
    .then((d) => renderCategories(d.categories || []));

  function renderCategories(categories) {
    tabsEl.innerHTML = "";
    categories.forEach((c, i) => {
      const tab = document.createElement("div");
      tab.className = "category-tab" + (i === 0 ? " active" : "");
      tab.textContent = c.name;
      tab.onclick = () => selectCategory(c.id, tab);
      tabsEl.appendChild(tab);
    });
    if (categories.length) selectCategory(categories[0].id, tabsEl.firstChild);
  }

  function selectCategory(id, el) {
    document
      .querySelectorAll(".category-tab")
      .forEach((t) => t.classList.remove("active"));
    el.classList.add("active");
    fetch(API.products + id)
      .then((r) => r.json())
      .then((d) => renderProducts(d.products || []));
  }

  function renderProducts(products) {
    productEl.innerHTML = "";

    products.forEach((p) => {
        const hasMultipleVariants = p.variants && p.variants.length > 1;
        
        // Price Logic: Check if discount exists
        const firstVariant = p.variants[0];
        const hasDiscount = firstVariant.base_price > firstVariant.price;

        productEl.innerHTML += `
        <div class="product-card" data-product-template-id="${p.id}">
          <a href="/shop/${p.slug_value}">
            <img src="${p.image}">
          </a>
          <div class="product-info">
            <div class="row">
              <div class="product-title">
                <a href="/shop/${p.slug_value}">${p.title}</a>
              </div>
              <div class="product-price">
                ₹<span class="price">${Math.round(firstVariant.price)}</span>
                ${hasDiscount ? `<span class="base-price">₹${Math.round(firstVariant.base_price)}</span>` : ''}
              </div>
            </div>
            <div class="product-desc">${p.short_description || ""}</div>
            <div class="rating-row">
              ${renderStars(p.rating || 0)}
              <span>(${p.rating_count || 0})</span>
            </div>

            <div class="variant-dropdown" style="${!hasMultipleVariants ? 'pointer-events: none;' : ''}">
              <div class="variant-selected ${!hasMultipleVariants ? 'no-arrow' : ''}"
                   data-product-id="${firstVariant.product_id}"
                   data-actual-price="${firstVariant.price}"
                   data-list-price="${firstVariant.base_price}"> ${firstVariant.name}
              </div>
              <div class="variant-options">
                ${p.variants.map((v) => `
                  <div class="variant-option" 
                       data-product-id="${v.product_id}" 
                       data-actual-price="${v.price}"
                       data-list-price="${v.base_price}"> ${v.name}
                  </div>`).join("")}
              </div>
            </div>

            <div class="cart-row">
              <button class="add-btn">ADD</button>
              <div class="qty-box hidden">
                <button class="qty-btn minus">−</button>
                <span class="qty">1</span>
                <button class="qty-btn plus">+</button>
              </div>
            </div>
          </div>
        </div>
      `;
    });
    // ... baki ka code same rahega

    // Arrow hide karne ke liye dynamic CSS
    if (!document.getElementById('variant-fix-style')) {
        const style = document.createElement('style');
        style.id = 'variant-fix-style';
        style.innerHTML = '.variant-selected.no-arrow::after { content: "" !important; }';
        document.head.appendChild(style);
    }

    bindProductEvents();
}

  const cartState = {};

  
function bindProductEvents() {
    document.querySelectorAll(".product-card").forEach((card) => {
        const priceEl = card.querySelector(".price");
        const addBtn = card.querySelector(".add-btn");
        const qtyBox = card.querySelector(".qty-box");
        const qtyEl = card.querySelector(".qty");

        const variantSelected = card.querySelector(".variant-selected");
        const variantOptions = card.querySelector(".variant-options");
        
        let basePriceEl = card.querySelector(".base-price");

        let qty = 1;
        // Logic to get initial prices and ID
        let unitPrice = Number(variantSelected.dataset.actualPrice || variantSelected.dataset.price);
        let listPrice = Number(variantSelected.dataset.listPrice);
        let productId = Number(variantSelected.dataset.productId);

        // Function to update price display based on selected variant/qty
        function updatePrice() {
            priceEl.textContent = Math.round(unitPrice * qty);
            
            if (listPrice > unitPrice) {
                if (!basePriceEl) {
                    const span = document.createElement('span');
                    span.className = 'base-price';
                    card.querySelector('.product-price').appendChild(span);
                    basePriceEl = span;
                }
                basePriceEl.textContent = "₹" + Math.round(listPrice * qty);
                basePriceEl.style.display = "inline";
            } else if (basePriceEl) {
                basePriceEl.style.display = "none";
            }
        }

        // Toggle dropdown
        variantSelected.onclick = (e) => {
            e.stopPropagation(); // Prevents immediate closing by the document click listener
            variantOptions.style.display = variantOptions.style.display === "block" ? "none" : "block";
        };

        // Handle variant selection
        variantOptions.querySelectorAll(".variant-option").forEach((opt) => {
            opt.onclick = () => {
                unitPrice = Number(opt.dataset.actualPrice || opt.dataset.price);
                listPrice = Number(opt.dataset.listPrice);
                productId = Number(opt.dataset.productId);
                
                variantSelected.textContent = opt.textContent;
                variantSelected.dataset.actualPrice = unitPrice;
                variantSelected.dataset.listPrice = listPrice;
                variantSelected.dataset.productId = productId;
                
                qty = 1;
                if(qtyEl) qtyEl.textContent = qty;
                updatePrice();
                variantOptions.style.display = "none";
            };
        });




        // Add to Cart Logic
        // Add to Cart Logic for Category Section
        addBtn.onclick = async () => {
            const originalText = "ADD";
            const darkBg = "#a86f24";
            const originalBg = "#d19a45";
            
            // Purani functionality: Loading state
            addBtn.disabled = true;
            addBtn.textContent = "Adding...";
            addBtn.style.backgroundColor = darkBg;
            addBtn.style.cursor = "not-allowed";

            try {
                const response = await fetch("/shop/cart/add", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "same-origin",
                    body: JSON.stringify({
                        params: {
                            product_template_id: Number(card.dataset.productTemplateId),
                            product_id: productId,
                            add_qty: 1,
                        },
                    }),
                });

                // Check HTTP status
                if (!response.ok) throw new Error("Network error");

                const data = await response.json();

                // Check Odoo specific error
                if (data.error) {
                    console.error("Odoo Error:", data.error);
                    throw new Error("Odoo failed to add product");
                }

                // Success notification on button
                addBtn.textContent = "Added!";
                
                // --- NEW POPUP LOGIC (As per design) ---
                // --- NEW POPUP LOGIC (Fixed for Discounted Price) ---
                const line = data.result.notification_info.lines[0];
                if (line) {
                    const catPop = document.getElementById("cat-cart-popup");
                    
                    // 1. Image aur Title update karein
                    document.getElementById("cat-pop-img").src = line.image_url;
                    document.getElementById("cat-pop-title").textContent = line.name;
                    
                    // 2. PRICE FIX: Card ke price ke according fixed
                    // Hum local unitPrice variable use kar rahe hain jo variant change hone par update hota hai
                    document.getElementById("cat-pop-price").textContent = Math.round(unitPrice * qty);
                    
                    // 3. Quantity Logic
                    const qtyText = line.combination_name && line.combination_name.trim() !== "" 
                                    ? line.combination_name 
                                    : "1 Kg";
                    document.getElementById("cat-pop-variant").textContent = qtyText;

                    // Popup show karein
                    catPop.classList.add("cat-show");
                    
                    setTimeout(() => {
                        catPop.classList.remove("cat-show");
                    }, 2500);
                }

                // --- CART COUNTER UPDATE (Old Functionality Kept Single dot) ---
                const newQty = data.result.cart_quantity;
                const cartQtyElements = document.querySelectorAll(".my_cart_quantity, .cart_quantity");

                if (cartQtyElements.length > 0) {
                    cartQtyElements.forEach(el => {
                        el.textContent = newQty;
                        el.classList.remove('d-none');
                        el.style.display = 'inline-block'; 
                    });
                } 
                
                if (typeof updateCartIcon === "function") {
                    updateCartIcon(newQty);
                }

                // Button reset timer
                setTimeout(() => {
                    addBtn.disabled = false;
                    addBtn.textContent = originalText;
                    addBtn.style.backgroundColor = originalBg;
                    addBtn.style.cursor = "pointer";
                }, 2000);

            } catch (err) {
                console.error("Cart Error:", err);
                alert("Could not add product. Please try again.");
                
                // Reset button on error
                addBtn.disabled = false;
                addBtn.textContent = originalText;
                addBtn.style.backgroundColor = originalBg;
                addBtn.style.cursor = "pointer";
            }
        };

        




        // Close dropdown when clicking outside
        document.addEventListener("click", (e) => {
            if (!card.contains(e.target)) variantOptions.style.display = "none";
        });
    });
}



  function renderStars(r) {
    let out = "";
    for (let i = 1; i <= 5; i++) {
      out += `<span class="star ${i <= Math.round(r) ? "filled" : ""
        }">★</span>`;
    }
    return out;
  }

  const strip = document.getElementById("productStrip");
  document.getElementById("nextBtn").onclick = () => {
    strip.scrollBy({ left: strip.offsetWidth * 0.7, behavior: "smooth" });
  };
  document.getElementById("prevBtn").onclick = () => {
    strip.scrollBy({ left: -strip.offsetWidth * 0.7, behavior: "smooth" });
  };
</script>
