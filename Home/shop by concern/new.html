<style>
  /* ===== EXISTING STYLES (UNCHANGED) ===== */
  .cp-wrapper {
    padding: 30px 0px;
    font-family: system-ui, sans-serif;
    position: relative;
  }

@media (min-width: 768px) {
  .cp-tabs {
    gap: 0px !important;
    margin-bottom: 30px;
    justify-content: space-between;
  }

  .cp-tab {
    padding: 12px 30px; /* larger clickable area */
    gap: 12px;
    font-size: 14px; /* bigger text for desktop */
    min-width: 120px; /* wider tabs */
  }
}

  .cp-tabs {
    padding:0 27px;
    display: flex;
    gap: 12px;
    font-size: 10px;
    overflow-x: auto;
    margin-bottom: 16px;
    scrollbar-width: none;
  }

  .cp-tabs::-webkit-scrollbar {
    display: none;
  }

  .cp-tab {

    border-radius: 5px;
    background: #daa345;
    color: #fff;
    font-weight: bolder;
    cursor: pointer;
    min-width: 100px;

    text-align: center;
    align-content: center;
  }

  .cp-tab.cp-active {
    background: #a86f24;
    box-shadow: 3px 6px 6px #0000002e;
  }

  .cp-products {
    padding:0 30px;
    display: flex;
    gap: 14px;
    overflow-x: auto;
   
  }

  .cp-products::-webkit-scrollbar {
    display: none;
  }

  .cp-card {
    flex: 0 0 70%;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    overflow: hidden;
    scroll-snap-align: start;
  }

   @media (min-width: 768px) {
    .cp-card {
      flex: 0 0 280px;
    }
  }

  .cp-card img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
  }

  .cp-info {
    padding: 10px;
  }

  .cp-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    min-height: 35px;
  }

  .cp-title {
    font-size: 14px;
    font-weight: 600;
    color: #a86f24;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.3;
    text-align: left
  }

  .cp-price {
    font-size: 14px;
    font-weight: 700;
    color: #a86f24;
    white-space: nowrap;
    width: 36%;
  }

  .cp-desc {
    font-size: 12px;
    color: #5f6f5f;
    margin: 6px 0;
    -webkit-line-clamp: 2;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-align: left;
  }

  .cp-rating {
    display: flex;
    gap: 6px;
    font-size: 12px;
    margin-bottom: 35px;
  }

  .cp-star {
    color: #ccc;
  }
  .cp-star.cp-filled {
    color: #f4b400;
  }

  /* ===== CUSTOM DROPDOWN ===== */
  .cp-variant {
    position: relative;
    margin: 8px 0;
    font-size: 13px;
  }

  .cp-variant-cpVariantSelectEl {
    padding: 8px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cp-variant-cpVariantSelectEl::after {
    content: "▾";
    font-size: 14px;
  }

  .cp-variant-options {
    position: absolute;
    top: 0%;
    left: 0;
    right: 0;
    background: #fff;
    border-radius: 6px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
    display: none;
    z-index: 20;
  }

  .cp-variant-option {
    padding: 8px 10px;
    cursor: pointer;
  }

  .cp-variant-option:hover {
    background: #f3f4f6;
  }

  /* ===== CART ===== */
  .cp-add {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: none;
    background: #d19a45;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
  }

  .cp-hidden {
    display: none;
  }

  .cpstrip-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;

    width: 36px;
    height: 36px;

    background: #e6e6e6; /* light grey */
    color: #333;

    border-radius: 50%;

    display: flex;
    align-items: center; /* vertical centering */
    justify-content: center; /* horizontal centering */

    font-size: 22px;
    font-weight: 600;
    line-height: 1; /* 🔴 CRITICAL for centering */

    cursor: pointer;
    user-select: none;

    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
  }

  .cpstrip-nav.left {
    left: 6px;
  }

  .cpstrip-nav.right {
    right: 6px;
  }



  /* Purani price ko cut karne ke liye ==============================*/
.base-price {
    text-decoration: line-through;
    color: #9ca3af;
    font-size: 12px;
    font-weight: 400;
    margin-left: 5px;
}


/* ============================ popup ================================= */

<div class="cp-wrapper">
  <div class="cpstrip-nav left" id="cpprevBtn">‹</div>
  <div class="cpstrip-nav right" id="cpnextBtn">›</div>
  <div class="cp-tabs-wrapper"><div class="cp-tabs" id="cpTabs"></div></div>
  <div class="cp-products" id="cpProducts"></div>
</div>

<script>
  const CP_API = {
    categories: "/api/concerns",
    products: "/api/products-by-id?concern_id=",
  };

  const cpTabsEl = document.getElementById("cpTabs");
  const cpProductsEl = document.getElementById("cpProducts");

  /* ===== CATEGORY ===== */
  fetch(CP_API.categories)
    .then((r) => r.json())
    .then((d) => renderCpCategories(d.concerns || []));

  function renderCpCategories(list) {
    cpTabsEl.innerHTML = "";
    list.forEach((c, i) => {
      const tab = document.createElement("div");
      tab.className = "cp-tab" + (i === 0 ? " cp-active" : "");
      tab.textContent = c.name;
      tab.onclick = () => selectCpCategory(c.id, tab);
      cpTabsEl.appendChild(tab);
    });
    if (list.length) selectCpCategory(list[0].id, cpTabsEl.firstChild);
  }

  function selectCpCategory(id, el) {
    document
      .querySelectorAll(".cp-tab")
      .forEach((t) => t.classList.remove("cp-active"));
    el.classList.add("cp-active");
    fetch(CP_API.products + id)
      .then((r) => r.json())
      .then((d) => renderCpProducts(d.products || []));
  }

  /* ===== PRODUCTS ===== */
  function renderCpProducts(products) {
    cpProductsEl.innerHTML = "";

    products.forEach((p) => {
        const hasMultipleVariants = p.variants && p.variants.length > 1;
        const firstVariant = p.variants[0];

        // logic: base_price > price (₹180 > ₹100)
        const hasDiscount = firstVariant.base_price > firstVariant.price;

        cpProductsEl.innerHTML += `
        <div class="cp-card" data-product-template-id="${p.id}">
            <a href="/shop/${p.slug_value}">
                <img src="${p.image}">
            </a>
            <div class="cp-info">
                <div class="cp-row">
                    <a href="/shop/${p.slug_value}" class="cp-title">${p.title}</a>
                    <div class="cp-price">
                        ₹<span class="price">${Math.round(firstVariant.price)}</span>
                        ${hasDiscount ? `<span class="base-price">₹${Math.round(firstVariant.base_price)}</span>` : ''}
                    </div>
                </div>

                <div class="cp-desc">${p.short_description || ""}</div>

                <div class="cp-rating">
                    ${renderCpStars(p.rating || 0)}
                    <span>(${p.rating_count || 0})</span>
                </div>

                <div class="cp-variant" style="${!hasMultipleVariants ? 'pointer-events: none;' : ''}">
                    <div class="cp-variant-cpVariantSelectEl ${!hasMultipleVariants ? 'no-arrow' : ''}"
                        data-product-id="${firstVariant.product_id}"
                        data-actual-price="${firstVariant.price}"
                        data-list-price="${firstVariant.base_price}">
                    ${firstVariant.name}
                    </div>

                    <div class="cp-variant-options">
                    ${p.variants.map((v) => `
                        <div class="cp-variant-option"
                            data-product-id="${v.product_id}"
                            data-actual-price="${v.price}"
                            data-list-price="${v.base_price}">
                        ${v.name}
                        </div>`).join("")}
                    </div>
                </div>

                <button class="cp-add">ADD</button>
            </div>
        </div>`;
    });

    // Arrow hide karne ke liye CSS
    if (!document.getElementById('cp-variant-style')) {
        const style = document.createElement('style');
        style.id = 'cp-variant-style';
        style.innerHTML = '.cp-variant-cpVariantSelectEl.no-arrow::after { content: "" !important; }';
        document.head.appendChild(style);
    }

    bindCpProductEvents();
}

  const cpCartState = {};

  /* ===== EVENTS (FIXED WITH DISCOUNT LOGIC) ===== */
function bindCpProductEvents() {
    document.querySelectorAll(".cp-card").forEach((cpCardEl) => {
        const cpPriceEl = cpCardEl.querySelector(".price");
        const cpVariantSelectEl = cpCardEl.querySelector(".cp-variant-cpVariantSelectEl");
        const options = cpCardEl.querySelector(".cp-variant-options");
        const cpAddBtnEl = cpCardEl.querySelector(".cp-add");
        
        // Strike-through (Purani price) ko select karne ke liye
        let basePriceEl = cpCardEl.querySelector(".base-price");

        let qty = 1;
        // Logic: Agar data-actual-price (₹100) hai toh wo lo, warna data-price (₹180) lo
        let unitPrice = Number(cpVariantSelectEl.dataset.actualPrice || cpVariantSelectEl.dataset.price);
        let listPrice = Number(cpVariantSelectEl.dataset.listPrice);
        let currentProductId = Number(cpVariantSelectEl.dataset.productId);

        // UI Update Function: Bold price aur katti hui price dono ke liye
        function updateCpPriceUI() {
            // 1. Nayi Bold Price Update
            cpPriceEl.textContent = Math.round(unitPrice * qty);
            
            // 2. Strike Price (Base Price) Update
            if (listPrice > unitPrice) {
                if (!basePriceEl) {
                    const span = document.createElement('span');
                    span.className = 'base-price';
                    cpCardEl.querySelector('.cp-price').appendChild(span);
                    basePriceEl = span;
                }
                basePriceEl.textContent = "₹" + Math.round(listPrice * qty);
                basePriceEl.style.display = "inline";
            } else if (basePriceEl) {
                basePriceEl.style.display = "none";
            }
        }

        // Dropdown toggle
        cpVariantSelectEl.onclick = (e) => {
            e.stopPropagation(); // Yeh line zaroori hai
            options.style.display = options.style.display === "block" ? "none" : "block";
        };

        // Variant change logic
        options.querySelectorAll(".cp-variant-option").forEach((opt) => {
            opt.onclick = () => {
                unitPrice = Number(opt.dataset.actualPrice || opt.dataset.price);
                listPrice = Number(opt.dataset.listPrice);
                currentProductId = Number(opt.dataset.productId);
                
                cpVariantSelectEl.textContent = opt.textContent;
                
                // Datasets update karo taaki reference bana rahe
                cpVariantSelectEl.dataset.actualPrice = unitPrice;
                cpVariantSelectEl.dataset.listPrice = listPrice;
                cpVariantSelectEl.dataset.productId = currentProductId;
                
                qty = 1; 
                updateCpPriceUI();
                options.style.display = "none";
            };
        });

        // Click outside dropdown close
        document.addEventListener("click", (e) => {
            if (!cpCardEl.contains(e.target)) options.style.display = "none";
        });

        // Cart Icon Update function (Logic unchanged)
        function updateCpCartIcon(cartQty) {
            window.sessionStorage.setItem("website_sale_cart_quantity", cartQty);
            const cartQtyEls = document.querySelectorAll(".my_cart_quantity");

            cartQtyEls.forEach((qtyEl) => {
                if (cartQty <= 0) {
                    qtyEl.classList.add("d-none");
                    return;
                }
                const cartIconEl = document.querySelector("li.o_wsale_my_cart");
                if (cartIconEl) cartIconEl.classList.remove("d-none");

                qtyEl.classList.remove("d-none");
                qtyEl.classList.add("o_mycart_zoom_animation");

                setTimeout(() => {
                    qtyEl.textContent = cartQty;
                    qtyEl.classList.remove("o_mycart_zoom_animation");
                }, 300);
            });
        }

        // Add to Cart Async Logic
        // Add to Cart Async Logic (Updated & Fixed)



        // Add to Cart Logic for Concern Section (CP)
cpAddBtnEl.onclick = async () => {
    const originalText = "ADD";
    const darkBg = "#a86f24"; 
    const originalBg = "#d19a45";

    // 1. Initial State: Button ko disable karein aur loading state dikhayein
    cpAddBtnEl.disabled = true;
    cpAddBtnEl.textContent = "Adding..."; 
    cpAddBtnEl.style.backgroundColor = darkBg;
    cpAddBtnEl.style.cursor = "not-allowed";

    try {
        const response = await fetch("/shop/cart/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "same-origin",
            body: JSON.stringify({
                params: {
                    product_template_id: Number(cpCardEl.dataset.productTemplateId),
                    product_id: currentProductId,
                    add_qty: 1,
                },
            }),
        });

        // HTTP level check
        if (!response.ok) throw new Error("Network error");

        const data = await response.json();

        // 2. Odoo Logic Error Check (e.g., Out of stock or Session issues)
        if (data.error) {
            console.error("Odoo Error:", data.error);
            throw new Error(data.error.data.message || "Odoo failed");
        }

        // 3. SUCCESS: Button update
        cpAddBtnEl.textContent = "Added!";
        
        // --- CP POPUP TRIGGER LOGIC ---
        // API response se notification_info ke andar ka product data nikalna
        // ... SUCCESS block ke andar ...
        const line = data.result.notification_info.lines[0];
        if (line) {
            const cpPop = document.getElementById("cp-cart-popup");
            
            // Set Product Image
            document.getElementById("cp-pop-img").src = line.image_url;
            
            // Set Title
            document.getElementById("cp-pop-title").textContent = line.name;
            
            // --- VARIANT/QUANTITY LOGIC ---
            // API response se 'combination_name' (jaise 1 Kg / 5 Kg) lo.
            // Agar empty mile, toh default '1 Kg' dikhao.
            const qtyText = line.combination_name && line.combination_name.trim() !== "" 
                            ? line.combination_name 
                            : "1 Kg";
                            
            document.getElementById("cp-pop-variant").textContent = qtyText;
            // ------------------------------
            
            // Set Price
            document.getElementById("cp-pop-price").textContent = Math.round(line.price_total);

            // Show Popup
            cpPop.classList.add("cp-show");
            
            setTimeout(() => {
                cpPop.classList.remove("cp-show");
            }, 2500);
        }
        

        // --- REAL-TIME CART UPDATE LOGIC ---
        // Header cart icon ka count update karna server response ke hisaab se
        const newCartQty = data.result.cart_quantity;
        const cartQtyEls = document.querySelectorAll(".my_cart_quantity, .cart_quantity");

        if (cartQtyEls.length > 0) {
            cartQtyEls.forEach((el) => {
                el.textContent = newCartQty;
                // Agar cart 0 tha toh d-none remove karke badge show karna
                el.classList.remove("d-none");
                el.style.display = "inline-block";
            });
        }
        
        // Agar theme ka core function available ho toh trigger karein
        if (typeof updateCpCartIcon === "function") {
            updateCpCartIcon(newCartQty);
        }

        // 2 second baad button ko wapas purani state mein lana
        setTimeout(() => {
            cpAddBtnEl.disabled = false;
            cpAddBtnEl.textContent = originalText;
            cpAddBtnEl.style.backgroundColor = originalBg;
            cpAddBtnEl.style.cursor = "pointer";
        }, 2000);

    } catch (err) {
        console.error("CP Cart Error:", err);
        // Error hone par user ko inform karna aur button reset karna
        alert("Product add nahi ho saka. Kripya refresh karke try karein.");
        
        cpAddBtnEl.disabled = false;
        cpAddBtnEl.textContent = originalText;
        cpAddBtnEl.style.backgroundColor = originalBg;
        cpAddBtnEl.style.cursor = "pointer";
    }
};
        





    });
}





  /* ===== STARS ===== */
  function renderCpStars(r) {
    let out = "";
    for (let i = 1; i <= 5; i++) {
      out += `<span class="cp-star ${
        i <= Math.round(r) ? "cp-filled" : ""
      }">★</span>`;
    }
    return out;
  }

  const cpstrip = document.getElementById("cpProducts");
  document.getElementById("cpnextBtn").onclick = () => {
    cpstrip.scrollBy({ left: cpstrip.offsetWidth * 0.7, behavior: "smooth" });
  };
  document.getElementById("cpprevBtn").onclick = () => {
    cpstrip.scrollBy({ left: -cpstrip.offsetWidth * 0.7, behavior: "smooth" });
  };
</script>
